trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: npm install -g netlify-cli
    displayName: 'Install Netlify CLI'

  - script: netlify deploy --prod --dir=. --skip-functions-cache --site $(NETLIFY_SITE_ID) --auth $(NETLIFY_AUTH_TOKEN)
    displayName: 'Deploy to Netlify'
